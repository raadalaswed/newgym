<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تعديل الملف الشخصي - Firebase</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0d0d0d] text-white font-sans pt-16 pb-24">

  <!-- 🔥 العنوان العلوي -->
  <p class="fixed top-0 left-0 w-full bg-[#111] text-[#f87171] text-center py-2 font-semibold shadow-md z-50">
    تم صنع الموقع بواسطة رعد الأسود
  </p>

  <header class="bg-red-700 p-5 text-center text-2xl font-extrabold mb-8">
    💪 تماريني - الملف الشخصي
  </header>

  <main class="max-w-md mx-auto px-4">

    <h1 class="text-3xl font-extrabold mb-6 text-center text-red-400">
      تعديل الملف الشخصي
    </h1>

    <form id="profileForm" class="space-y-5">

      <!-- اسم المستخدم -->
      <div>
        <label class="block mb-1 font-semibold">اسم المستخدم:</label>
        <input id="username" type="text"
          class="w-full p-3 bg-[#222] rounded-md" required />
      </div>

      <!-- الطول -->
      <div>
        <label class="block mb-1 font-semibold">الطول (سم):</label>
        <input id="height" type="number"
          class="w-full p-3 bg-[#222] rounded-md" required />
      </div>

      <!-- الوزن -->
      <div>
        <label class="block mb-1 font-semibold">الوزن (كغ):</label>
        <input id="weight" type="number"
          class="w-full p-3 bg-[#222] rounded-md" required />
      </div>

      <!-- حفظ -->
      <button type="submit"
        class="w-full bg-red-600 hover:bg-red-700 p-3 font-bold rounded-md">
        حفظ التغييرات
      </button>
    </form>

    <!-- 🔥 بيانات العرض -->
    <div id="displayData" class="mt-6 text-center text-red-400 font-bold"></div>

    <!-- 🔥 زر التمرين اليوم (Streak) -->
    <button id="workoutTodayBtn"
      class="w-full bg-blue-600 hover:bg-blue-700 p-3 font-bold rounded-md mt-6">
      💪 سجل تمرين اليوم
    </button>

    <p id="streakText" class="text-center mt-3 text-yellow-400 font-bold"></p>

  </main>

  <!-- 🔻 شريط التنقل -->
  <nav class="bg-red-700 fixed bottom-0 w-full flex justify-around p-4 text-3xl z-40">
    <a href="index.html">🏠</a>
    <a href="workouts.html">🏋️‍♂️</a>
    <a href="meals.html">🍽️</a>
    <a href="stats.html">📊</a>
    <a href="profile.html">👤</a>
  </nav>

  <!-- 🔥 Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
      authDomain: "garag-system.firebaseapp.com",
      databaseURL: "https://garag-system-default-rtdb.firebaseio.com",
      projectId: "garag-system",
      storageBucket: "garag-system.firebasestorage.app",
      messagingSenderId: "330947022055",
      appId: "1:330947022055:web:ce96293502f40d2645a642"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const form = document.getElementById("profileForm");
    const displayData = document.getElementById("displayData");

    const workoutTodayBtn = document.getElementById("workoutTodayBtn");
    const streakText = document.getElementById("streakText");

    let currentData = {};

    // 📅 التاريخ
    function getToday() {
      return new Date().toISOString().split("T")[0];
    }

    // 🔥 حفظ البيانات
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = form.username.value.trim();
      const height = Number(form.height.value);
      const weight = Number(form.weight.value);

      const snapshot = await get(ref(db, "gymUsers/" + username));
      currentData = snapshot.exists() ? snapshot.val() : {};

      await set(ref(db, "gymUsers/" + username), {
        ...currentData,
        username,
        height,
        weight
      });

      displayData.textContent =
        `الاسم: ${username} - الطول: ${height} سم - الوزن: ${weight} كغ`;
    });

    // 💪 Streak System
    workoutTodayBtn.addEventListener("click", async () => {
      const username = form.username.value.trim();
      if (!username) return;

      const today = getToday();

      const snapshot = await get(ref(db, "gymUsers/" + username));

      let data = snapshot.exists() ? snapshot.val() : {};

      let streak = data.streak || 0;
      let lastDate = data.lastWorkoutDate || null;

      if (lastDate === today) {
        streakText.textContent = "⚠️ سجلت تمرينك اليوم بالفعل";
        return;
      }

      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yDate = yesterday.toISOString().split("T")[0];

      if (lastDate === yDate) {
        streak++;
      } else {
        streak = 1;
      }

      await set(ref(db, "gymUsers/" + username), {
        ...data,
        streak,
        lastWorkoutDate: today
      });

      let msg = "";
      if (streak >= 7) msg = "🔥 ممتاز جداً! سلسلة قوية!";
      else if (streak >= 3) msg = "💪 بداية رائعة استمر!";
      else msg = "🚀 استمر ولا تتوقف!";

      streakText.textContent = `🔥 سلسلة التمرين: ${streak} يوم\n${msg}`;
    });

  </script>

</body>
</html>
