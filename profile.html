<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الملف الشخصي - نظام الالتزام</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background:#0d0d0d;
      color:white;
    }

    .day {
      width: 38px;
      height: 38px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:8px;
      margin:2px;
      font-size:12px;
    }

    .green { background:#16a34a; }
    .red { background:#dc2626; }
    .gray { background:#374151; }
  </style>
</head>

<body class="pb-24">

<header class="bg-red-700 p-5 text-center text-2xl font-bold">
  👤 الملف الشخصي - الالتزام
</header>

<main class="max-w-md mx-auto p-4">

  <!-- 👤 المستخدم -->
  <div class="bg-gray-800 p-4 rounded-lg text-center mb-4">
    <h2 id="username" class="text-xl font-bold text-red-400"></h2>

    <p id="streakText" class="mt-2 text-yellow-400 font-bold"></p>
    <p id="percentText" class="text-blue-300 font-bold"></p>
  </div>

  <!-- 🏆 Badges -->
  <div class="bg-gray-800 p-4 rounded-lg mb-4">
    <h3 class="font-bold text-red-400 mb-2">🏆 الإنجازات</h3>
    <div id="badges"></div>
  </div>

  <!-- 📅 Calendar -->
  <div class="bg-gray-800 p-4 rounded-lg">
    <h3 class="font-bold text-red-400 mb-2">📅 التقويم الشهري</h3>

    <div class="flex justify-between mb-2 text-sm text-gray-300">
      <span>أحد</span><span>إث</span><span>ث</span><span>أر</span><span>خ</span><span>ج</span><span>س</span>
    </div>

    <div id="calendar" class="flex flex-wrap"></div>
  </div>

  <!-- زر -->
  <button id="markBtn"
    class="w-full mt-4 bg-blue-600 p-3 rounded-lg font-bold">
    💪 تسجيل تمرين اليوم
  </button>

</main>

<!-- Navigation -->
<nav class="bg-red-700 fixed bottom-0 w-full flex justify-around p-4 text-3xl">
  <a href="index.html">🏠</a>
  <a href="workouts.html">🏋️‍♂️</a>
  <a href="meals.html">🍽️</a>
  <a href="stats.html">📊</a>
  <a href="profile.html">👤</a>
</nav>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain:"garag-system.firebaseapp.com",
  databaseURL:"https://garag-system-default-rtdb.firebaseio.com",
  projectId:"garag-system",
  storageBucket:"garag-system.firebasestorage.app",
  messagingSenderId:"330947022055",
  appId:"1:330947022055:web:ce96293502f40d2645a642"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const currentUser = "رعد"; // لاحقاً تربطه بـ login

const username = document.getElementById("username");
const calendar = document.getElementById("calendar");
const streakText = document.getElementById("streakText");
const percentText = document.getElementById("percentText");
const badges = document.getElementById("badges");
const markBtn = document.getElementById("markBtn");

function getToday(){
  return new Date().toISOString().split("T")[0];
}

// 📅 توليد الشهر
function generateMonth(){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  return {firstDay, daysInMonth, year, month};
}

// 🔥 حساب streak
function calcStreak(att){
  let streak = 0;
  let d = new Date();

  while(true){
    const key = d.toISOString().split("T")[0];
    if(att[key]){
      streak++;
      d.setDate(d.getDate()-1);
    } else break;
  }

  return streak;
}

// 📊 نسبة الالتزام
function calcPercent(att, days){
  let done = Object.keys(att || {}).length;
  return Math.round((done / days) * 100);
}

// 🏆 badges
function renderBadges(streak){
  badges.innerHTML = "";

  if(streak >= 7){
    badges.innerHTML += "🥉 7 أيام متتالية<br>";
  }
  if(streak >= 30){
    badges.innerHTML += "🥇 30 يوم أسطوري<br>";
  }
  if(streak === 0){
    badges.innerHTML = "ابدأ التمرين اليوم 💪";
  }
}

// 📅 عرض calendar
function renderCalendar(att){
  const {firstDay, daysInMonth} = generateMonth();

  calendar.innerHTML = "";

  // empty cells
  for(let i=0;i<firstDay;i++){
    const div = document.createElement("div");
    div.className="day gray";
    calendar.appendChild(div);
  }

  for(let d=1; d<=daysInMonth; d++){
    const date = new Date();
    date.setDate(d);
    const key = date.toISOString().split("T")[0];

    const div = document.createElement("div");
    div.className = "day";

    if(att[key]){
      div.classList.add("green");
      div.textContent = d;
    } else {
      div.classList.add("red");
      div.textContent = d;
    }

    calendar.appendChild(div);
  }
}

// 🔥 تحميل البيانات
async function load(){
  const snap = await get(ref(db,"gymUsers/"+currentUser));

  let data = snap.exists()? snap.val() : {};

  if(!data.attendance) data.attendance = {};

  username.textContent = data.username || currentUser;

  const streak = calcStreak(data.attendance);

  streakText.textContent = "🔥 Streak: " + streak + " يوم";

  const percent = calcPercent(data.attendance, 30);
  percentText.textContent = "📊 الالتزام: " + percent + "%";

  renderBadges(streak);
  renderCalendar(data.attendance);

  return data;
}

// 💪 تسجيل اليوم
markBtn.onclick = async () => {
  const snap = await get(ref(db,"gymUsers/"+currentUser));
  let data = snap.exists()? snap.val() : {};

  if(!data.attendance) data.attendance = {};

  const today = getToday();

  data.attendance[today] = true;

  await set(ref(db,"gymUsers/"+currentUser), data);

  load();
};

load();

</script>

</body>
</html>
