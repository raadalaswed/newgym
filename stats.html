<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الإحصائيات</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #0d0d0d;
      color: white;
      padding-bottom: 60px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
  </style>
</head>

<body>

<header class="bg-red-600 p-4 text-center text-xl font-bold">
  📊 إحصائيات المستخدمين
</header>

<main class="p-4 max-w-lg mx-auto">

  <!-- 👥 المستخدمين -->
  <div class="bg-gray-800 p-4 rounded-lg mb-5">
    <h2 class="font-bold text-lg mb-3 text-red-400">👥 المستخدمين</h2>
    <div id="usersList" class="space-y-2"></div>
  </div>

  <!-- 🔍 البحث -->
  <div class="bg-gray-800 p-4 rounded-lg mb-5">
    <h2 class="font-bold text-lg mb-2 text-red-400">🔎 البحث عن مستخدم</h2>

    <input id="searchInput"
           type="text"
           placeholder="اكتب اسم المستخدم..."
           class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700">

    <button id="searchBtn"
            class="mt-3 w-full bg-red-600 p-3 rounded-lg font-bold">
      بحث
    </button>

    <p id="searchMessage" class="text-center mt-3 text-red-300"></p>
  </div>

  <!-- 👤 البيانات -->
  <div id="userStatsBox" class="hidden bg-gray-800 p-4 rounded-lg">

    <h2 id="userTitle" class="text-center text-red-400 font-bold text-xl mb-4"></h2>

    <label>الوزن (كغ)</label>
    <input id="weightInput" type="number"
           class="w-full p-2 mb-3 bg-gray-900 border border-gray-700">

    <!-- 🔥 تم التعديل: الطول بالسنتيمتر -->
    <label>الطول (سم)</label>
    <input id="heightInput" type="number"
           placeholder="مثال: 175"
           class="w-full p-2 mb-2 bg-gray-900 border border-gray-700">

    <p class="text-gray-400 text-sm mb-3">
      أدخل الطول بالسنتيمتر (مثال: 175 سم)
    </p>

    <label>عدد التمارين</label>
    <input id="workoutsInput" type="number"
           class="w-full p-2 mb-3 bg-gray-900 border border-gray-700">

    <label>السعرات</label>
    <input id="caloriesInput" type="number"
           class="w-full p-2 mb-3 bg-gray-900 border border-gray-700">

    <!-- 🔥 BMI -->
    <p id="bmiResult" class="text-center text-yellow-400 font-bold mb-3"></p>

    <!-- 📊 شرح BMI -->
    <div class="text-sm text-gray-300 text-center mb-3">
      <p>📊 <b>BMI</b> هو مؤشر كتلة الجسم</p>
      <p>يستخدم لمعرفة إذا كان وزنك مناسب لطولك</p>
      <p>🔹 أقل من 18.5 = نحيف</p>
      <p>🔹 18.5 - 24.9 = طبيعي</p>
      <p>🔹 25 - 29.9 = وزن زائد</p>
      <p>🔹 30+ = سمنة</p>
    </div>

    <button id="saveBtn"
            class="w-full bg-green-600 p-3 rounded-lg font-bold">
      💾 حفظ
    </button>

    <p id="saveMessage" class="text-center mt-3"></p>
  </div>

</main>

<!-- 🔻 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain: "garag-system.firebaseapp.com",
  databaseURL: "https://garag-system-default-rtdb.firebaseio.com",
  projectId: "garag-system",
  storageBucket: "garag-system.firebasestorage.app",
  messagingSenderId: "330947022055",
  appId: "1:330947022055:web:ce96293502f40d2645a642"
};
 <!-- شريط التنقل -->
  <nav class="bg-red-600 fixed bottom-0 w-full flex justify-around p-3 text-2xl">
    <a href="index.html" class="text-white" aria-label="الرئيسية">🏠</a>
    <a href="workouts.html" class="text-white" aria-label="التمارين">🏋️‍♂️</a>
    <a href="meals.html" class="text-white" aria-label="الوجبات">🍽️</a>
    <a href="stats.html" class="text-white" aria-label="الإحصائيات">📊</a>
    <a href="profile.html" class="text-white" aria-label="الملف الشخصي">👤</a>
  </nav>
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ---------------- DOM ----------------
const users = ["حسين","رعد","نور الحسين","مريم","حسن"];

const usersList = document.getElementById("usersList");
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const searchMessage = document.getElementById("searchMessage");

const userBox = document.getElementById("userStatsBox");
const userTitle = document.getElementById("userTitle");

const weightInput = document.getElementById("weightInput");
const heightInput = document.getElementById("heightInput");
const workoutsInput = document.getElementById("workoutsInput");
const caloriesInput = document.getElementById("caloriesInput");

const bmiResult = document.getElementById("bmiResult");

const saveBtn = document.getElementById("saveBtn");
const saveMessage = document.getElementById("saveMessage");

let currentUser = null;

// ---------------- عرض المستخدمين ----------------
users.forEach(user => {
  const div = document.createElement("div");
  div.textContent = user;
  div.className = "bg-gray-700 p-2 rounded text-center cursor-pointer hover:bg-red-600";

  div.onclick = () => {
    searchInput.value = user;
    searchBtn.click();
  };

  usersList.appendChild(div);
});

// ---------------- البحث ----------------
searchBtn.onclick = async () => {
  const name = searchInput.value.trim();

  if (!users.includes(name)) {
    searchMessage.textContent = "❌ المستخدم غير موجود";
    userBox.classList.add("hidden");
    return;
  }

  searchMessage.textContent = "✔ تم العثور على المستخدم";
  currentUser = name;
  userBox.classList.remove("hidden");
  userTitle.textContent = "بيانات: " + name;

  const snapshot = await get(ref(db, "gymUsers/" + name));

  if (snapshot.exists()) {
    const data = snapshot.val();
    weightInput.value = data.weight || "";
    heightInput.value = data.height || "";
    workoutsInput.value = data.workouts || "";
    caloriesInput.value = data.calories || "";
  } else {
    weightInput.value = "";
    heightInput.value = "";
    workoutsInput.value = "";
    caloriesInput.value = "";
  }

  calculateBMI();
};

// ---------------- BMI ----------------
function calculateBMI() {
  const w = Number(weightInput.value);
  const hCm = Number(heightInput.value);

  if (w > 0 && hCm > 0) {
    const h = hCm / 100; // تحويل سم إلى متر
    const bmi = w / (h * h);

    let status = "";
    if (bmi < 18.5) status = "نحيف";
    else if (bmi < 25) status = "طبيعي";
    else if (bmi < 30) status = "زائد";
    else status = "سمنة";

    bmiResult.textContent = `BMI: ${bmi.toFixed(2)} (${status})`;
  } else {
    bmiResult.textContent = "";
  }
}

weightInput.oninput = calculateBMI;
heightInput.oninput = calculateBMI;

// ---------------- حفظ ----------------
saveBtn.onclick = async () => {
  if (!currentUser) return;

  await set(ref(db, "gymUsers/" + currentUser), {
    weight: Number(weightInput.value),
    height: Number(heightInput.value),
    workouts: Number(workoutsInput.value),
    calories: Number(caloriesInput.value)
  });

  saveMessage.textContent = "✔ تم الحفظ بنجاح";
  setTimeout(() => saveMessage.textContent = "", 2000);
};

</script>

</body>
</html>
